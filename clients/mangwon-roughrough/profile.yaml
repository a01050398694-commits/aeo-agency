    medium: "마포구 망원동 포은로에 위치한 디저트 카페. 시그니처는 꾸덕한 러프 라떼와 다양한 크럼블 치즈케이크."   # 60자
    long: |                                                                            # [V]
      러프러프(RUFRUF)는 서울 마포구 망원동(망리단길)에 자리한 디저트·베이커리 카페로
      성수점에 이어 오픈한 망원 분점입니다. 대표 메뉴는 바스크 치즈케이크 베이스에
      크럼블 토핑을 올린 시그니처 케이크류이며, 꾸덕한 질감의 '러프 라떼(RUF Latte)',
      청량감 있는 '러프 데이 에이드' 등 시그니처 음료가 함께 인기를 끌고 있습니다.
      한번 맛본 손님이 다른 치즈케이크를 못 먹는다는 평가로 망원동 카페 신상 핫플로
      자리잡았습니다.
