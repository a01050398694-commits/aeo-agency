name: Weekly Report

# 매주 월요일 09:00 KST = 일요일 00:00 UTC
on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Write .env from secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_OPS_CHAT_ID: ${{ secrets.TELEGRAM_OPS_CHAT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          OPS_EMAIL: ${{ secrets.OPS_EMAIL }}
        run: |
          {
            echo "SUPABASE_URL=$SUPABASE_URL"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY"
            echo "TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN"
            echo "TELEGRAM_OPS_CHAT_ID=$TELEGRAM_OPS_CHAT_ID"
            echo "RESEND_API_KEY=$RESEND_API_KEY"
            echo "FROM_EMAIL=onboarding@resend.dev"
            echo "OPS_EMAIL=$OPS_EMAIL"
          } > .env

      - name: Generate weekly report
        run: python scripts/reports/weekly_email.py
